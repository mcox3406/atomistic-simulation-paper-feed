name: Daily Paper Feed

on:
  schedule:
    # 8am EDT (12pm UTC)
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      skip_slack:
        description: 'Skip the Slack post (still writes JSON + history). Use for backfilling.'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  filter-papers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run paper filter
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          OPENREVIEW_USERNAME: ${{ secrets.OPENREVIEW_USERNAME }}
          OPENREVIEW_PASSWORD: ${{ secrets.OPENREVIEW_PASSWORD }}
        run: |
          if [ "${{ inputs.skip_slack }}" = "true" ]; then
            python run.py --no-slack
          else
            python run.py
          fi

      - name: Commit history & data files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add posted_papers.json frontend/public/data/papers
          git diff --staged --quiet || git commit -m "Update papers $(date -u +%Y-%m-%d)"
          git push
